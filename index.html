<!DOCTYPE html>
<html>
<head>
  <!-- ปรับขนาดให้พอดีกับหน้าจอมือถือ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- แก้ปัญหา browser ที่ยังไม่รองรับ importmap -->
  <script async src="https://unpkg.com/es-module-shims@1.7.3/dist/es-module-shims.js"></script>

  <!-- กำหนด path ของ library ต่าง ๆ -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.153.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.153.0/examples/jsm/",
      "gltfloader": "https://unpkg.com/three@0.153.0/examples/jsm/loaders/GLTFLoader.js",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <!-- เรียกไฟล์ JavaScript หลัก -->
  <script src="main.js" type="module"></script>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
  </style>
</head>

<body>
</body>
</html>
